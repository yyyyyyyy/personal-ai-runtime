name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify dependency metadata is synchronized
        working-directory: backend
        run: python scripts/check_dependency_sync.py

      - name: Install locked dependencies
        run: |
          cd backend
          python -m pip install --require-hashes -r requirements.lock

      - name: Run canonical backend CI checks
        run: make backend-ci-core

  dependency-platforms:
    name: Locked dependencies (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Verify dependency metadata
        working-directory: backend
        run: python scripts/check_dependency_sync.py

      - name: Install locked dependencies
        working-directory: backend
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Import smoke (runtime packages)
        working-directory: backend
        run: python -c "import uvicorn, chromadb; from chromadb.utils.embedding_functions import DefaultEmbeddingFunction; assert DefaultEmbeddingFunction is not None"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Lint (ESLint + Prettier)
        run: |
          cd frontend
          npm run lint

      - name: Frontend unit tests
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Install Playwright browser
        run: |
          cd frontend
          npx playwright install chromium

      - name: Frontend E2E tests
        run: |
          cd frontend
          npm run test:e2e

  desktop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Desktop smoke tests
        run: make desktop-test

  real-backend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend deps
        working-directory: backend
        run: |
          python scripts/check_dependency_sync.py
          python -m pip install --require-hashes -r requirements.lock

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run real-backend E2E tests
        working-directory: frontend
        run: npm run test:e2e:real

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-real-backend-traces
          path: frontend/test-results/
