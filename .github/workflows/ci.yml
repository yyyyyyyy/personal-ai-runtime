name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Python syntax check
        run: |
          cd backend
          python -m compileall app/ -q

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app/

      - name: Type check (mypy)
        run: |
          cd backend
          # Kernel + Runtime layer (strict); full app/ has legacy type debt outside this scope
          mypy app/core/runtime/ app/core/agents/memory_engine.py app/core/agents/memory_extractor.py scripts/ --ignore-missing-imports

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --cov=app --cov-report=term -m "not live_llm"

      - name: Verify database schema
        run: |
          cd backend
          python -c "
          import os
          os.environ['LLM_API_KEY'] = 'test-key'
          from app.store.database import db
          required = ['conversations','messages','goals','actions','events','memories','reviews','notifications','schedules','activity_log','documents','tasks','llm_calls','tool_calls','approvals','background_tasks','triggers','user_profile','inbox_emails']
          with db.get_db() as conn:
              tables = {t['name'] for t in conn.execute('SELECT name FROM sqlite_master WHERE type=\"table\"').fetchall()}
              missing = [t for t in required if t not in tables]
              assert not missing, f'Missing tables: {missing}'
              assert conn.execute('PRAGMA foreign_keys').fetchone()[0] == 1, 'Foreign keys OFF'
              print(f'OK: {len(required)} tables, FK=ON')
          "

      - name: Verify MCP tools
        run: |
          cd backend
          python -c "
          import os
          os.environ['LLM_API_KEY'] = 'test-key'
          from app.core.harness.mcp_hub import mcp_hub
          tools = mcp_hub.get_tool_defs_for_llm()
          expected = {'get_current_time','read_file','write_file','list_directory','search_files','web_search','fetch_url','list_calendar_events','add_calendar_event','get_upcoming_events','check_inbox','read_inbox_email','send_email','open_web_page','search_and_extract','get_clipboard','ocr_image','shell_exec','git_status','git_log','git_diff','telegram_send','telegram_updates'}
          actual = {t['function']['name'] for t in tools}
          assert len(actual) == 23, f'Expected 23 tools, got {len(actual)}'
          assert actual == expected, f'Mismatch: expected={expected- actual}, extra={actual - expected}'
          assert mcp_hub.needs_confirmation('write_file') == True
          assert mcp_hub.needs_confirmation('send_email') == True
          assert mcp_hub.needs_confirmation('add_calendar_event') == True
          assert mcp_hub.needs_confirmation('shell_exec') == True
          assert mcp_hub.is_async('web_search') == True
          assert mcp_hub.is_async('telegram_send') == True
          print(f'OK: {len(tools)} tools registered')
          "

      - name: Verify API routes load (core, experimental off)
        run: |
          cd backend
          python -c "
          import os
          os.environ['LLM_API_KEY'] = 'test-key'
          os.environ['EXPERIMENTAL_TRAJECTORY_ENABLED'] = 'false'
          import importlib
          import app.config
          import app.main as main_module
          importlib.reload(app.config)
          importlib.reload(main_module)
          app = main_module.app
          routes = [r.path for r in app.routes if hasattr(r, 'path')]
          endpoints = [
              '/api/chat/conversations',
              '/api/chat/approvals/',
              '/api/goals/',
              '/api/memory/memories',
              '/api/memory/memories/grouped',
              '/api/memory/profile',
              '/api/knowledge/documents',
              '/api/reviews/',
              '/api/notifications/',
              '/api/system/health',
              '/api/events/',
              '/api/tasks/',
              '/api/telemetry/',
              '/api/approvals/',
              '/api/tasks/background',
              '/api/triggers/',
              '/api/inbox/',
          ]
          for ep in endpoints:
              assert any(r.startswith(ep) for r in routes), f'Missing: {ep}'
          traj = [r for r in routes if r.startswith('/api/trajectories')]
          assert not traj, f'Trajectory routes should be gated off: {traj}'
          print(f'OK: {len(endpoints)} core API modules loaded (trajectories gated)')
          "

      - name: Verify Event Log rebuild (Runtime invariant)
        run: |
          cd backend
          python scripts/verify_rebuild.py

      - name: Verify export roundtrip (data sovereignty)
        run: |
          cd backend
          python scripts/verify_export_roundtrip.py

      - name: Verify projection snapshot incremental rebuild
        run: |
          cd backend
          python scripts/verify_snapshot_rebuild.py

      - name: Kernel boundary guard (no direct writes to projection tables)
        run: |
          cd backend
          python scripts/check_boundary.py

      - name: LLM Egress audit log
        run: |
          cd backend
          python scripts/verify_egress.py

  experimental:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Experimental Meaning/Trajectory verifies (non-blocking)
        run: |
          cd backend
          make experimental-verify || true
          python scripts/verify_claim_authority.py || true
          python scripts/verify_trajectory_rebuild.py || true
          python scripts/verify_identity.py || true

      - name: Verify trajectory API routes when experimental enabled
        run: |
          cd backend
          python -c "
          import os
          import importlib
          os.environ['LLM_API_KEY'] = 'test-key'
          os.environ['EXPERIMENTAL_TRAJECTORY_ENABLED'] = 'true'
          import app.config
          import app.main as main_module
          importlib.reload(app.config)
          importlib.reload(main_module)
          routes = [r.path for r in main_module.app.routes if hasattr(r, 'path')]
          for ep in ('/api/trajectories/', '/api/trajectories/pending-links'):
              assert any(r.startswith(ep) for r in routes), f'Missing: {ep}'
          print('OK: trajectory API routes present when experimental enabled')
          " || true

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
