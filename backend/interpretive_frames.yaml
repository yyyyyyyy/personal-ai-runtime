# Interpretive Frame Registry — registered interpretive lenses for Meaning generation.
#
# Frames define "from what angle" Meaning objects (Belief, Trajectory) are generated.
# A Frame bundles one or more atomic Perspectives (growth, autonomy, care, etc.) into
# a reusable interpretive lens.
#
# Status: v0.1 — proposed (not yet ratified; see INTERPRETIVE_GOVERNANCE.md).
# Frames are NOT Runtime Primitives. They are governance configuration for the
# Interpretive Layer that sits above Ontology and below Projection.
#
# Governance rules:
#   - System MAY propose Frames (claim_status: proposed), MUST NOT be sole author
#   - Frame creation/retirement goes through epistemic state machine
#   - Retired Frames retain tombs™ (cf. Release)
#   - Frame set MUST NOT be silently reduced to singleton

version: 1

