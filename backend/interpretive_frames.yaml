# --- Atomic Perspectives ---
# These are the fundamental interpretive dimensions that Frames compose.
# Not yet formally modeled; listed here for Frame composition reference.
#
#   growth        — personal development, learning, improvement
#   mastery       — skill acquisition, expertise, craft
#   autonomy      — self-direction, independence, freedom from control
#   care          — nurturing, protection, emotional investment
#   responsibility — duty, obligation, reliability
#   belonging     — connection, community, acceptance
#   security      — safety, stability, predictability
#   health        — physical and mental wellbeing
#   balance       — equilibrium, moderation, sustainability
#   freedom       — exploration, optionality, lack of constraint
#   expression    — creation, articulation, making visible
