# Backend binds 0.0.0.0 inside the container. Set AUTH_TOKEN in .env before exposing ports.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - backend-data:/app/backend/data
    working_dir: /app/backend
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    working_dir: /app/frontend
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  backend-data:
