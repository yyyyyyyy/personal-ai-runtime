services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - AUTH_TOKEN=${AUTH_TOKEN:-}  # REQUIRED for production: set in .env or pass via AUTH_TOKEN=... docker-compose up
    volumes:
      - backend-data:/app/backend/data
    working_dir: /app/backend
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_HOST: backend
        VITE_API_PORT: "8000"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_HOST=backend
      - VITE_API_PORT=8000
    working_dir: /app/frontend
    command: npx serve dist -l 5173 --no-clipboard
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
